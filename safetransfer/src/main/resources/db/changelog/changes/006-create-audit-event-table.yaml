databaseChangeLog:
  - changeSet:
      id: 006-create-audit-event-table
      author: nnowak
      changes:
        - createTable:
            tableName: audit_event
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_audit_event
                    nullable: false
              - column:
                  name: source_event_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: tenant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_type
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: recorded_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: correlation_id
                  type: text
              - column:
                  name: causation_id
                  type: text

        - createIndex:
            tableName: audit_event
            indexName: idx_audit_event_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: audit_event
            indexName: idx_audit_event_aggregate_id
            columns:
              - column:
                  name: aggregate_id

services:
  postgres:
    image: postgres:16
    container_name: safe-transfer-postgres
    environment:
      POSTGRES_DB: safe_transfer
      POSTGRES_USER: safe_transfer
      POSTGRES_PASSWORD: safe_transfer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safe_transfer -d safe_transfer"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: safe-transfer-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/safe_transfer
      SPRING_DATASOURCE_USERNAME: safe_transfer
      SPRING_DATASOURCE_PASSWORD: safe_transfer
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 3

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16
    container_name: safe-transfer-postgres
    environment:
      POSTGRES_DB: safe_transfer
      POSTGRES_USER: safe_transfer
      POSTGRES_PASSWORD: safe_transfer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safe_transfer -d safe_transfer"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

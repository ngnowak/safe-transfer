spring:
  application:
    name: safetransfer
  docker:
    compose:
      file: docker/docker-compose.yml
    #  lifecycle-management: none
  datasource:
    url: jdbc:postgresql://localhost:5432/safe_transfer
    username: safe_transfer
    password: safe_transfer
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

application:
  kafka:
    publishing: false
    topics:
      transfer-completed: wallet.transfer.completed

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.nn.safetransfer: INFO
    org.zalando.logbook: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

logbook:
  format:
    style: json
  strategy: default
  predicate:
    include:
      - path: /api/**
    exclude:
      - path: /actuator/**
      - path: /swagger-ui/**
      - path: /v3/api-docs/**
  obfuscate:
    headers:
      - Authorization
      - Cookie
      - Set-Cookie
      - X-Api-Key
    parameters:
      - access_token
      - token
      - password
    json-body-fields:
      - password
      - secret
      - token

safetransfer:
  transfer:
    risk:
      enabled: true
      max-single-transfer-amount: 10000.00
  outbox:
    publisher:
      fixed-delay: 5000
      batch-size: 100
      max-retries: 3

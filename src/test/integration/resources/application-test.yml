spring:
  docker:
    compose:
      enabled: false
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

safetransfer:
  outbox:
    publisher:
      fixed-delay: 600000
      batch-size: 100
      max-retries: 3
